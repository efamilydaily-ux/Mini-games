<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🐹 倉鼠數學訓練營</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<!-- ══════════════════════════════════════
     SCENE 1 · LOGIN
══════════════════════════════════════ -->
<div id="scene-login" class="scene active">
  <div class="login-blobs">
    <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
  </div>
  <div class="login-card">
    <span class="login-mascot">🐹</span>
    <h1 class="login-title">倉鼠數學訓練營</h1>
    <p class="login-sub">練好數學，幫倉鼠佈置夢幻豪宅！</p>
    <div class="field">
      <label>訓練師名字</label>
      <input id="inp-name" type="text" placeholder="你的名字" maxlength="20" autocomplete="username"/>
    </div>
    <div class="field">
      <label>密碼（至少 6 位）</label>
      <input id="inp-pw" type="password" placeholder="密碼" maxlength="30" autocomplete="current-password"/>
    </div>
    <button id="btn-login" class="btn-cta">出發！🚀</button>
    <p id="login-err" class="login-err"></p>
  </div>
</div>

<!-- ══════════════════════════════════════
     SCENE 2 · HOME
══════════════════════════════════════ -->
<div id="scene-home" class="scene">

  <header class="hud">
    <span class="hud-name">🐹 <span id="hud-name">訓練師</span></span>
    <div class="score-pill">
      <span class="spl">答對</span>
      <span id="hud-score">0</span>
      <span class="spl">題</span>
    </div>
    <div class="hud-progress-wrap">
      <span class="hud-plabel">下個解鎖 <b id="next-unlock">20</b> 題</span>
      <div class="pbar-track"><div class="pbar-fill" id="pbar-fill"></div></div>
    </div>
  </header>

  <div class="home-layout">

    <!-- LEFT: Cage -->
    <div class="cage-scene" id="cage-scene">
      <img id="cage-bg" class="cage-bg" src="hamster-math/images/cage.jpg" alt="cage"/>
      <div id="furniture-layer"></div>
      <div class="hamster-actor" id="hamster-actor">
        <div class="h-bubble" id="h-bubble"></div>
        <img class="h-sprite" id="h-sprite" src="hamster-math/images/hamster.png" alt="hamster"/>
      </div>
      <div id="final-overlay" class="final-overlay hidden">
        <div class="final-inner">
          <div class="final-trophy">🏆</div>
          <div class="final-title">恭喜通關！</div>
          <div class="final-sub">你是倉鼠最強室內設計師！</div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Side panel -->
    <div class="home-side">
      <div class="side-stats">
        <div class="stat-row">
          錯題複習：<span id="queue-home" class="q-badge">0</span> 題
        </div>
      </div>

      <!-- Furniture checklist — ALL items shown, locked or unlocked -->
      <div class="furn-list-wrap">
        <div class="furn-list-title">🏡 家具圖鑑</div>
        <div class="furn-list" id="furn-list">
          <!-- Populated by JS -->
        </div>
      </div>

      <button id="btn-start" class="btn-start">✏️ 開始答題！</button>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════
     SCENE 3 · QUIZ
══════════════════════════════════════ -->
<div id="scene-quiz" class="scene">
  <header class="quiz-hud">
    <div class="score-pill">
      <span class="spl">答對</span>
      <span id="quiz-score">0</span>
      <span class="spl">題</span>
    </div>
    <div id="review-badge" class="review-badge hidden">🔄 複習</div>
    <button id="btn-exit" class="btn-exit">💾 退出存檔</button>
  </header>

  <div class="quiz-body">
    <div class="qz-hamster-wrap">
      <img id="qz-sprite" class="qz-sprite" src="hamster-math/images/hamster.png" alt="hamster"/>
    </div>
    <div class="timer-ring-wrap">
      <svg class="t-ring" viewBox="0 0 120 120">
        <circle class="tr-bg"   cx="60" cy="60" r="52"/>
        <circle class="tr-fill" id="tr-fill" cx="60" cy="60" r="52"/>
      </svg>
      <span class="t-num" id="t-num">3</span>
    </div>
    <div class="q-box">
      <div class="q-text" id="q-text">準備好了嗎？</div>
    </div>
    <div class="ans-row">
      <input id="ans-input" class="ans-input" type="number"
             placeholder="答案" min="0" max="999" autocomplete="off"/>
      <button id="btn-submit" class="btn-submit">✔</button>
    </div>
    <div id="feedback" class="feedback hidden"></div>
    <div class="queue-info">錯題隊列：<span id="q-count" class="q-badge">0</span> 題</div>
  </div>
</div>

<!-- ══════════════════════════════════════
     CONGRATS OVERLAY
══════════════════════════════════════ -->
<div id="congrats-overlay" class="c-overlay hidden">
  <div class="c-card">
    <div id="c-confetti" class="c-confetti"></div>
    <div class="c-title">🎉 Congrats! 🎉</div>
    <div class="c-hamster">🐹</div>
    <div id="c-furniture" class="c-furniture"></div>
    <div id="c-message"  class="c-message"></div>
    <button id="btn-continue" class="btn-cta" style="margin-top:0">繼續練習！</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
